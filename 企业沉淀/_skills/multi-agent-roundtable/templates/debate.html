<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏛️ 三省六部 · 实时辩论</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0f172a; color: #e2e8f0; font-family: -apple-system, 'Segoe UI', system-ui, sans-serif; height: 100vh; display: flex; flex-direction: column; }
  header { background: linear-gradient(135deg, #1e293b, #0f172a); padding: 16px 24px; border-bottom: 1px solid #334155; display: flex; align-items: center; gap: 16px; flex-shrink: 0; }
  header h1 { font-size: 18px; font-weight: 600; }
  #status-badge { padding: 4px 12px; border-radius: 999px; font-size: 12px; font-weight: 500; }
  .status-pending { background: #f59e0b; color: #1e293b; }
  .status-done { background: #22c55e; color: #1e293b; }
  .status-error { background: #ef4444; color: #fff; }
  #topic { color: #94a3b8; font-size: 14px; flex: 1; }
  #msg-count { color: #64748b; font-size: 13px; }
  #main { flex: 1; overflow-y: auto; padding: 16px 24px; display: flex; flex-direction: column; gap: 8px; }
  .msg { padding: 12px 16px; border-radius: 8px; max-width: 85%; line-height: 1.6; font-size: 14px; animation: fadeIn 0.2s ease; }
  .msg-right { align-self: flex-end; }
  .speaker-label { font-size: 12px; font-weight: 600; margin-bottom: 4px; }
  .speaker-data { background: #1e3a5f; border-left: 3px solid #3b82f6; }
  .speaker-data .speaker-label { color: #60a5fa; }
  .speaker-ops { background: #1e3a2f; border-left: 3px solid #22c55e; }
  .speaker-ops .speaker-label { color: #4ade80; }
  .speaker-legal { background: #3b1e3a; border-left: 3px solid #c084fc; }
  .speaker-legal .speaker-label { color: #c084fc; }
  .speaker-layer { background: #1e2a3a; border-left: 3px solid #f59e0b; }
  .speaker-layer .speaker-label { color: #fbbf24; }
  .speaker-algo { background: #1e1e3a; border-left: 3px solid #f472b6; }
  .speaker-algo .speaker-label { color: #f472b6; }
  .speaker-intel { background: #1e3a3a; border-left: 3px solid #2dd4bf; }
  .speaker-intel .speaker-label { color: #2dd4bf; }
  .speaker-default { background: #1e293b; border-left: 3px solid #64748b; }
  .speaker-default .speaker-label { color: #94a3b8; }
  .msg-content { white-space: pre-wrap; word-break: break-word; }
  .msg-time { font-size: 11px; color: #475569; margin-top: 4px; text-align: right; }
  .empty-state { flex: 1; display: flex; align-items: center; justify-content: center; color: #475569; font-size: 15px; flex-direction: column; gap: 12px; }
  .empty-state .icon { font-size: 48px; }
  #connecting { display: none; text-align: center; padding: 8px; color: #64748b; font-size: 13px; flex-shrink: 0; border-top: 1px solid #1e293b; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>
<header>
  <h1>🏛️ 三省六部</h1>
  <span id="status-badge" class="status-pending">等待讨论...</span>
  <span id="topic">—</span>
  <span id="msg-count">0 轮</span>
</header>
<div id="main">
  <div class="empty-state">
    <div class="icon">🏛️</div>
    <div>三省六部尚未开议</div>
    <div style="font-size:13px;color:#334155">页面每 2 秒自动刷新</div>
  </div>
</div>
<div id="connecting">🔄 连接中...</div>

<script>
const POLL_URL = './dashboard_status.json';
let lastCount = 0;

function speakerClass(name) {
  if (!name) return 'default';
  const n = name.replace(/[📊🎯⚖️🧬🔬🔍]/g, '').trim();
  if (n.includes('数据')) return 'data';
  if (n.includes('运营')) return 'ops';
  if (n.includes('法务')) return 'legal';
  if (n.includes('分层')) return 'layer';
  if (n.includes('算法')) return 'algo';
  if (n.includes('情报')) return 'intel';
  return 'default';
}

function render(turns, status, topic) {
  const main = document.getElementById('main');
  const badge = document.getElementById('status-badge');
  const topicEl = document.getElementById('topic');
  const countEl = document.getElementById('msg-count');
  topicEl.textContent = topic || '—';
  if (status && status.includes('完成')) {
    badge.className = 'status-done';
    badge.textContent = '✅ 讨论完成';
  } else if (status && status.includes('讨论')) {
    badge.className = 'status-pending';
    badge.textContent = '⏳ 讨论中...';
  } else {
    badge.className = 'status-pending';
    badge.textContent = '等待讨论...';
  }
  if (!turns || turns.length === 0) {
    if (main.querySelector('.empty-state')) return;
    main.innerHTML = `<div class="empty-state"><div class="icon">🏛️</div><div>三省六部尚未开议</div><div style="font-size:13px;color:#334155">页面每 2 秒自动刷新</div></div>`;
    countEl.textContent = '0 轮';
    return;
  }
  countEl.textContent = `${turns.length} 轮`;
  const shouldScroll = main.scrollTop + main.clientHeight >= main.scrollHeight - 60;
  for (let i = lastCount; i < turns.length; i++) {
    const t = turns[i];
    const sClass = speakerClass(t.speaker);
    const div = document.createElement('div');
    div.className = `msg speaker-${sClass}`;
    div.innerHTML = `<div class="speaker-label">${t.speaker || '未知'}</div><div class="msg-content">${escapeHtml(t.content || '')}</div><div class="msg-time">${new Date().toLocaleTimeString()}</div>`;
    main.appendChild(div);
  }
  lastCount = turns.length;
  if (shouldScroll || turns.length <= 3) main.scrollTop = main.scrollHeight;
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

async function poll() {
  try {
    const resp = await fetch(POLL_URL, { cache: 'no-store' });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();
    document.getElementById('connecting').style.display = 'none';
    render(data.turns || [], data.status, data.topic);
  } catch (e) {
    document.getElementById('connecting').style.display = 'block';
  }
}
poll();
setInterval(poll, 2000);
</script>
</body>
</html>
